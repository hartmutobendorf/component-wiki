server.document-root = "/var/www/html"
server.port = 80
index-file.names = ("index.html")
mimetype.assign = (
  ".html" => "text/html",
  ".css" => "text/css",
  ".js" => "application/javascript",
  ".json" => "application/json",
  ".png" => "image/png",
  ".jpg" => "image/jpeg",
  ".jpeg" => "image/jpeg",
  ".gif" => "image/gif",
  ".svg" => "image/svg+xml",
  ".ico" => "image/x-icon",
  ".woff" => "font/woff",
  ".woff2" => "font/woff2",
  ".ttf" => "font/ttf",
  ".webp" => "image/webp",
  ".xml" => "application/xml",
  ".txt" => "text/plain"
)
server.errorlog = "/dev/stderr"
