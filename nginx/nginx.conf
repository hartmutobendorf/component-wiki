server {
    listen 80;
    server_name ${WEBHOOK_DOMAIN};

    # Only allow POST requests to the specific webhook endpoint
    location /hooks/redeploy-markdown-server {
        # Only allow POST requests
        limit_except POST {
            deny all;
        }
        
        proxy_pass http://webhook:${WEBHOOK_INTERNAL_PORT};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny all other requests
    location / {
        return 404;
    }
}

server {
    listen 80;
    server_name ${MAIN_DOMAIN} www.${MAIN_DOMAIN};

    location / {
        proxy_pass http://markdown-server:${MARKDOWN_SERVER_INTERNAL_PORT};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
