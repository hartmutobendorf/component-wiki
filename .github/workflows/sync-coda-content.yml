name: Sync Coda Content

on:
    workflow_dispatch:
        inputs:
            reason:
                description: "Reason for syncing content"
                required: false
                default: "Manual sync triggered"

jobs:
    sync-content:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install

            - name: Run coda-sync
              env:
                  CODA_API_TOKEN: ${{ secrets.CODA_API_TOKEN }}
              run: pnpm sync

            - name: Run transform
              run: pnpm transform

            - name: Check for content changes
              id: git-check
              run: |
                  git add data/
                  if git diff --cached --quiet; then
                    echo "changes=false" >> $GITHUB_OUTPUT
                  else
                    echo "changes=true" >> $GITHUB_OUTPUT
                  fi

            - name: Commit and push changes
              if: steps.git-check.outputs.changes == 'true'
              run: |
                  git config --local user.email "github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"
                  git commit -m "chore: sync content from Coda - ${{ github.event.inputs.reason || 'Manual sync' }}"
                  git push

            - name: No changes detected
              if: steps.git-check.outputs.changes != 'true'
              run: echo "No changes detected in content"
