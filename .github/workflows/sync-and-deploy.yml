name: Sync Content and Deploy

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            reason:
                description: "Reason for syncing and deploying"
                required: false
                default: "Manual sync and deploy triggered"

jobs:
    sync-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              working-directory: ./coda-content-retrieve
              run: bun install

            - name: Run coda-content-retrieve
              working-directory: ./coda-content-retrieve
              env:
                  CODA_API_TOKEN: ${{ secrets.CODA_API_TOKEN }}
                  CODA_DOC_ID: ${{ secrets.CODA_DOC_ID }}
                  CODA_TABLE_ID: ${{ secrets.CODA_TABLE_ID }}
              run: bun run index.ts

            - name: Check for changes
              id: git-check
              run: |
                  git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

            - name: Commit and push changes
              if: steps.git-check.outputs.changes == 'true'
              run: |
                  git config --local user.email "github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"
                  git add content/
                  git commit -m "chore: sync content from Coda - ${{ github.event.inputs.reason || 'Auto sync on push to main' }}"
                  git push

            - name: Trigger webhook deployment
              env:
                  WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
                  WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
              run: |
                  # Get the latest commit SHA
                  COMMIT_SHA=$(git rev-parse HEAD)

                  # Create webhook payload
                  PAYLOAD=$(cat <<EOF
                  {
                    "ref": "refs/heads/main",
                    "after": "$COMMIT_SHA",
                    "repository": {
                      "full_name": "${{ github.repository }}"
                    },
                    "pusher": {
                      "name": "github-actions[bot]"
                    },
                    "head_commit": {
                      "message": "Content sync and deployment triggered"
                    }
                  }
                  EOF
                  )

                  # Generate HMAC signature
                  SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/^.* //')

                  # Send webhook request
                  curl -X POST "$WEBHOOK_URL" \
                    -H "Content-Type: application/json" \
                    -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
                    -H "X-GitHub-Event: push" \
                    -d "$PAYLOAD"

                  echo "Webhook triggered successfully"

            - name: Summary
              run: |
                  if [ "${{ steps.git-check.outputs.changes }}" == "true" ]; then
                    echo "✅ Content synced, committed, and deployment webhook triggered"
                  else
                    echo "ℹ️ No content changes detected, deployment webhook triggered anyway"
                  fi
