name: Sync Content and Deploy

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            reason:
                description: "Reason for syncing and deploying"
                required: false
                default: "Manual sync and deploy triggered"

jobs:
    sync-and-deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install

            - name: Run coda-sync
              env:
                  CODA_API_TOKEN: ${{ secrets.CODA_API_TOKEN }}
              run: pnpm sync

            - name: Run transform
              run: pnpm transform

            - name: Check for content changes
              id: git-check
              run: |
                  git add data/
                  if git diff --cached --quiet; then
                    echo "changes=false" >> $GITHUB_OUTPUT
                  else
                    echo "changes=true" >> $GITHUB_OUTPUT
                  fi

            - name: Commit and push changes
              if: steps.git-check.outputs.changes == 'true'
              run: |
                  git config --local user.email "github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"
                  git commit -m "chore: sync content from Coda - ${{ github.event.inputs.reason || 'Auto sync on push to main' }}"
                  git push

            - name: Build Astro app
              run: pnpm build:app

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ghcr.io/${{ github.repository }}:latest,ghcr.io/${{ github.repository }}:${{ github.sha }}

            - name: Summary
              run: |
                  if [ "${{ steps.git-check.outputs.changes }}" == "true" ]; then
                    echo "✅ Content synced, committed, built, and deployed to BunnyCDN"
                  else
                    echo "ℹ️ No content changes detected, but app built and deployed to BunnyCDN"
                  fi
